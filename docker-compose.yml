version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - product-service
      - order-service
      - payment-service
    networks:
      - backend
    restart: unless-stopped

  auth-service:
    build: ./auth-service
    env_file: ./auth-service/.env
    networks:
      - backend
    restart: unless-stopped

  product-service:
    build: ./product-service
    env_file: ./product-service/.env
    networks:
      - backend
    restart: unless-stopped

  order-service:
    build: ./order-service
    env_file: ./order-service/.env
    depends_on:
      - product-service
      - payment-service
    networks:
      - backend
    restart: unless-stopped

  payment-service:
    build: ./payment-service
    env_file: ./payment-service/.env
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    driver: bridge

