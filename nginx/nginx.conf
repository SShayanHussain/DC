events {}

http {
    upstream auth_upstream    { server auth-service:3001; }
    upstream product_upstream { server product-service:3002; }
    upstream order_upstream   { server order-service:3003; }
    upstream payment_upstream { server payment-service:3004; }
    upstream edge_upstream    { server edge-service:3005; }

    map $http_origin $cors_origin {
        default                  "";
        "http://localhost:5173"  "http://localhost:5173";
        "http://localhost:4173"  "http://localhost:4173";
    }

    server {
        listen 80;

        location ~ ^/api/auth(/.*)?$ {
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'  $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain';
                return 204;
            }
            rewrite ^/api/auth(/.*)?$ /auth$1 break;
            proxy_pass       http://auth_upstream;
            proxy_set_header Host      $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Origin    $http_origin;
            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
        }

        location ~ ^/api/filter(/.*)?$ {
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'  $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain';
                return 204;
            }
            rewrite ^/api/filter(/.*)?$ /filter$1 break;
            proxy_pass       http://product_upstream;
            proxy_set_header Host      $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Origin    $http_origin;
            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
        }

        location ~ ^/api/products(/.*)?$ {
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'  $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain';
                return 204;
            }
            rewrite ^/api/products(/.*)?$ /products$1 break;
            proxy_pass       http://edge_upstream;
            proxy_set_header Host      $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Origin    $http_origin;
            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
        }

        location ~ ^/api/orders(/.*)?$ {
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'  $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain';
                return 204;
            }
            rewrite ^/api/orders(/.*)?$ /orders$1 break;
            proxy_pass       http://order_upstream;
            proxy_set_header Host      $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Origin    $http_origin;
            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
        }

        location ~ ^/api/payments(/.*)?$ {
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'  $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain';
                return 204;
            }
            rewrite ^/api/payments(/.*)?$ /payments$1 break;
            proxy_pass       http://payment_upstream;
            proxy_set_header Host      $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Origin    $http_origin;
            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
        }
    }
}
